name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller playwright
    
    - name: Build executable
      run: |
        pyinstaller --onefile --noconsole --name "RockWaveMusicPlayer" `
          --hidden-import=playwright `
          --hidden-import=playwright.sync_api `
          --collect-all playwright `
          rockwave_music_play.py
    
    - name: Create README
      run: |
        @'
        RockWave Music Player v1.0.0
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        
        功能:
          • 搜索下载 jzmp3.com 音乐
          • 支持 MP3/AAC/FLAC/WAV
          • 自动提取歌词
          • 内置播放器
        
        使用方法:
          1. 双击 RockWaveMusicPlayer.exe 启动
          2. 首次运行会自动下载浏览器（约150MB，需要网络）
          3. 等待浏览器下载完成即可使用
        
        要求: Windows 7+, 网络连接
        
        Copyright © 2024 RockWave
        '@ | Out-File -FilePath dist/README.txt -Encoding UTF8
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RockWaveMusicPlayer-Windows
        path: |
          dist/RockWaveMusicPlayer.exe
          dist/README.txt
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/RockWaveMusicPlayer.exe
          dist/README.txt
